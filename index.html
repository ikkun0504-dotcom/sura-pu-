  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #d4a017;
    --gold-dark: #b8860b;
    --gold-light: #fdf9e3;
    --text: #222;
    --text-sub: #555;
    --border: #e8d88a;
    --tag-red: #e8524a;
    --tag-green: #4caf70;
    --tag-blue: #4a7abf;
    --bg: #fefce8;
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== PASSWORD PAGE ===== */
  .pw-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: white;
    padding: 40px 24px;
  }
  .pw-logo {
    font-size: 1.6rem;
    font-weight: 400;
    color: white;
    background: var(--gold);
    padding: 14px 40px;
    border-radius: 4px;
    margin-bottom: 40px;
    letter-spacing: 0.1em;
  }
  .pw-form { width: 100%; max-width: 320px; }
  .pw-form label { font-size: 0.9rem; color: var(--text-sub); display: block; margin-bottom: 6px; }
  .pw-form input[type="password"] {
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 1rem;
    margin-bottom: 12px;
    font-family: inherit;
  }
  .pw-check { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 0.85rem; color: var(--text-sub); }
  .pw-btn {
    width: 100%;
    background: var(--gold);
    color: white;
    border: none;
    border-radius: 4px;
    padding: 11px;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: inherit;
  }
  .pw-btn:hover { background: var(--gold-dark); }
  .pw-error { color: var(--tag-red); font-size: 0.85rem; margin-top: 8px; display: none; }

  /* ===== HEADER ===== */
  header {
    background: var(--gold);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header h1 {
    color: white;
    font-size: 1.4rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    cursor: pointer;
  }
  .hamburger {
    position: absolute;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
  }
  .hamburger span {
    display: block;
    width: 26px;
    height: 2px;
    background: white;
    border-radius: 2px;
  }

  /* ===== NAV OVERLAY ===== */
  .nav-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
  }
  .nav-overlay.open { display: block; }
  .nav-menu {
    position: fixed;
    top: 0; right: 0;
    width: 240px;
    height: 100%;
    background: white;
    padding: 20px 0;
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.25s ease;
  }
  .nav-overlay.open .nav-menu { transform: translateX(0); }
  .nav-menu a {
    display: block;
    padding: 14px 24px;
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.95rem;
  }
  .nav-menu a:hover { background: var(--gold-light); color: var(--gold); }
  .nav-close {
    display: flex;
    justify-content: flex-end;
    padding: 8px 16px 16px;
    cursor: pointer;
    font-size: 1.3rem;
    color: #888;
  }

  /* ===== PAGE SYSTEM ===== */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== HOME PAGE ===== */
  .news-header {
    background: var(--gold);
    padding: 10px 16px;
  }

  .news-item {

  .news-date { font-size: 0.82rem; color: var(--text-sub); margin-bottom: 6px; }
  .news-desc { font-size: 0.85rem; color: var(--text-sub); line-height: 1.55; }

  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px 10px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--gold);
    border-radius: 2px;
  }

  /* ===== AREA PAGE ===== */
  .area-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 12px 20px;
  }
  .area-btn {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 13px 8px;
    text-align: center;
    font-size: 0.88rem;
    color: var(--gold-dark);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .area-btn:hover, .area-btn:active {
    background: var(--gold);
    color: white;
    border-color: var(--gold);
  }

    font-size: 1.4rem;
    font-weight: 700;
    padding: 16px 16px 8px;
    color: var(--text);
    background: white;
    border-bottom: 2px solid var(--gold-light);
  }
  .shop-card {
    background: white;
    margin: 10px 12px;
    border-radius: 8px;
    padding: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .shop-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 6px;
    cursor: pointer;
  }
  .shop-name:hover { text-decoration: underline; }
  .shop-type {
    font-size: 0.82rem;
    color: var(--text-sub);
  }
  .tag {
    display: inline-block;
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    border: 1.5px solid;
    margin: 4px 4px 0 0;
    transition: opacity 0.15s;

  .tag.green { color: var(--tag-green); border-color: var(--tag-green); }
  .tag.blue  { color: var(--tag-blue);  border-color: var(--tag-blue); }

    font-size: 1.2rem;
    font-weight: 700;
    padding: 16px;
    background: white;

  .detail-memo {

    cursor: pointer;
    font-family: inherit;
  }

</style>

// ===== PASSWORD =====
function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === '0401') { // ← パスワードはここを変える
    document.getElementById('page-password').style.display = 'none';
    document.getElementById('site-wrap').style.display = 'block';
    if (document.getElementById('pw-remember').checked) {
      localStorage.setItem('slurp_auth', '1');
    }
  } else {
    document.getElementById('pw-error').style.display = 'block';
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});
if (localStorage.getItem('slurp_auth') === '1') {
  document.getElementById('page-password').style.display = 'none';
  document.getElementById('site-wrap').style.display = 'block';
}

// ===== PAGE =====
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  window.scrollTo(0, 0);
}
function openNav() { document.getElementById('nav-overlay').classList.add('open'); }
function closeNav() { document.getElementById('nav-overlay').classList.remove('open'); }
function closeNavIfOutside(e) {
  if (e.target === document.getElementById('nav-overlay')) closeNav();
}

// ===== SHOP LIST =====
function showShops(region) {
  document.getElementById('region-name').textContent = region;
  const shops = shopData[region] || [];
  const list = document.getElementById('shop-list');

  if (shops.length === 0) {
    list.innerHTML = '<div style="padding:24px 16px; color:#888; text-align:center;">この地域の店舗情報は準備中です</div>';
  } else {
    list.innerHTML = shops.map((s, i) => `
      <div class="shop-card">
        <div class="shop-name" onclick="showDetail('${region}', ${i})">${s.name}</div>
        <div>
          ${(s.tags || []).map((t, ti) => {
            const cls = ti === 0 ? 'red' : ti === 1 ? 'green' : 'blue';
            return `<span class="tag ${cls}">${t}</span>`;
          }).join('')}
        </div>
      </div>
    `).join('');
  }
  showPage('shops');
}

// ===== DETAIL =====
function showDetail(region, idx) {
  const s = (shopData[region] || [])[idx];
  if (!s) return;
  document.getElementById('detail-name').textContent = s.name;
  document.getElementById('detail-memo').textContent = s.memo || '（詳細情報なし）';
  document.getElementById('detail-back-btn').onclick = () => showShops(region);
  showPage('detail');
}
</script>
